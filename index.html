<!DOCTYPE html>
<html>
    <head>
        <title>TIP CALCULATOR</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="images/favicon.ico">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="img">
            <div class="container">
                <h1>TIP CALCULATOR</h1><br>

                <input type="number" class="bill" placeholder="Enter bill amount"><br>

                <select class="rating"> 
                    <option value="Excellent">Excellent (20%)</option>
                    <option value="Good" selected>Good (15%)</option>
                    <option value="Average">Average (10%)</option>
                    <option value="Poor">Poor (5%)</option>
                </select><br>

                <button onclick="handlecalculate()">Calculate</button><br>

                <div class="results">
                    <div class="card">
                        <h3>Tip</h3>
                        <h3 class="tip">₹ 0</h3>
                    </div>
                    <div class="card">
                        <h3>Total</h3>
                        <h3 class="total">₹ 0</h3>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
